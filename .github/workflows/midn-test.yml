# .github/workflows/midn-test.yml
# Tests for all Midn Core crates.
#
# Trigger options:
#   workflow_dispatch           — always runs all crates
#   push / pull_request with commit gate tokens:
#     --midn-auth               — test midn-auth only
#     --midn-proto              — test midn-proto only
#     --midn-core               — test midn-core only
#     --midn-userplane          — test midn-userplane only
#     --midn-all                — test all crates
#   Auto-detection: changed files under crates/midn-*/ trigger the matching crate.
#   Workspace-root changes (Cargo.toml, rust-toolchain.toml) trigger all crates.
#
# eBPF feature (midn-userplane --features ebpf):
#   Runs whenever midn-userplane is triggered.
#   Requires: bpf-linker + nightly with rust-src (installed automatically).
#   continue-on-error: true — verifier failures don't block the test gate.
#   Produces midn-userplane-ebpf-test-raw.txt in the artifact.

name: midn-core — Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions:  read

jobs:

  # ── Decide which crates to test ──────────────────────────────────────────────
  parse-trigger:
    runs-on: ubuntu-latest
    outputs:
      run_auth:      ${{ steps.decide.outputs.run_auth }}
      run_proto:     ${{ steps.decide.outputs.run_proto }}
      run_core:      ${{ steps.decide.outputs.run_core }}
      run_userplane: ${{ steps.decide.outputs.run_userplane }}
      run_any:       ${{ steps.decide.outputs.run_any }}
    steps:
      - name: Checkout (for path-based change detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide which crates to run
        id: decide
        run: |
          AUTH=false
          PROTO=false
          CORE=false
          UP=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            AUTH=true; PROTO=true; CORE=true; UP=true

          else
            MSG="${{ github.event.head_commit.message }}${{ github.event.pull_request.title }}"
            echo "$MSG" | grep -qiE '\-\-midn-all\b'       && { AUTH=true; PROTO=true; CORE=true; UP=true; } || true
            echo "$MSG" | grep -qiE '\-\-midn-auth\b'      && AUTH=true  || true
            echo "$MSG" | grep -qiE '\-\-midn-proto\b'     && PROTO=true || true
            echo "$MSG" | grep -qiE '\-\-midn-core\b'      && CORE=true  || true
            echo "$MSG" | grep -qiE '\-\-midn-userplane\b' && UP=true    || true

            if [ "${{ github.event_name }}" = "pull_request" ]; then
              CHANGED=$(git diff --name-only \
                "${{ github.event.pull_request.base.sha }}" HEAD 2>/dev/null || true)
            else
              CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            fi

            if [ -n "$CHANGED" ]; then
              echo "--- changed files ---"
              echo "$CHANGED"
              echo "---------------------"

              echo "$CHANGED" | grep -qE '^crates/midn-auth/'         && AUTH=true  || true
              echo "$CHANGED" | grep -qE '^crates/midn-proto/'        && PROTO=true || true
              echo "$CHANGED" | grep -qE '^crates/midn-core/'         && CORE=true  || true
              echo "$CHANGED" | grep -qE '^crates/midn-userplane[^-]' && UP=true    || true

              echo "$CHANGED" | grep -qE '^benches/auth_bench'        && AUTH=true  || true
              echo "$CHANGED" | grep -qE '^benches/proto_bench'       && PROTO=true || true

              echo "$CHANGED" | grep -qE \
                '^Cargo\.toml$|^rust-toolchain\.toml$|^\.github/workflows/midn-test\.yml$' \
                && { AUTH=true; PROTO=true; CORE=true; UP=true; } || true
            fi
          fi

          ANY=false
          [ "$AUTH" = "true" ] || [ "$PROTO" = "true" ] || \
          [ "$CORE" = "true" ] || [ "$UP"   = "true" ]  && ANY=true || true

          echo "run_auth=$AUTH"       >> $GITHUB_OUTPUT
          echo "run_proto=$PROTO"     >> $GITHUB_OUTPUT
          echo "run_core=$CORE"       >> $GITHUB_OUTPUT
          echo "run_userplane=$UP"    >> $GITHUB_OUTPUT
          echo "run_any=$ANY"         >> $GITHUB_OUTPUT

          echo "Auth:$AUTH  Proto:$PROTO  Core:$CORE  Userplane:$UP  Any:$ANY"

  # ── Run tests ─────────────────────────────────────────────────────────────────
  run-tests:
    runs-on: ubuntu-latest
    needs: parse-trigger
    if: needs.parse-trigger.outputs.run_any == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Get Rust version
        id: rustver
        run: echo "ver=$(rustc --version)" >> $GITHUB_OUTPUT

      # Install nightly + rust-src for eBPF compilation (userplane only).
      # bpf-linker is the LLVM-based linker for BPF targets — not in rustup.
      # Cache the installed binary to avoid recompiling it every run.
      - name: Install nightly toolchain + rust-src (eBPF)
        if: needs.parse-trigger.outputs.run_userplane == 'true'
        run: |
          rustup toolchain install nightly --component rust-src
          echo "Nightly: $(rustup run nightly rustc --version)"

      - name: Cache bpf-linker binary
        if: needs.parse-trigger.outputs.run_userplane == 'true'
        id: cache-bpf-linker
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/bpf-linker
          key: bpf-linker-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: bpf-linker-${{ runner.os }}-

      - name: Install bpf-linker
        if: |
          needs.parse-trigger.outputs.run_userplane == 'true' &&
          steps.cache-bpf-linker.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          cargo install bpf-linker
          echo "bpf-linker: $(bpf-linker --version 2>/dev/null || echo 'installed')"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-midn-${{ hashFiles('Cargo.toml') }}
          restore-keys: cargo-registry-

      # ── Lint (non-blocking) ──────────────────────────────────────────────────
      - name: Clippy — midn-auth
        if: needs.parse-trigger.outputs.run_auth == 'true'
        continue-on-error: true
        run: cargo clippy -p midn-auth -- -D warnings

      - name: Clippy — midn-proto
        if: needs.parse-trigger.outputs.run_proto == 'true'
        continue-on-error: true
        run: cargo clippy -p midn-proto -- -D warnings

      - name: Clippy — midn-core
        if: needs.parse-trigger.outputs.run_core == 'true'
        continue-on-error: true
        run: cargo clippy -p midn-core -- -D warnings

      - name: Clippy — midn-userplane
        if: needs.parse-trigger.outputs.run_userplane == 'true'
        continue-on-error: true
        run: cargo clippy -p midn-userplane -- -D warnings

      # ── Build (stable, no features) ───────────────────────────────────────────
      - name: Build midn-auth
        if: needs.parse-trigger.outputs.run_auth == 'true'
        run: cargo build -p midn-auth

      - name: Build midn-proto
        if: needs.parse-trigger.outputs.run_proto == 'true'
        run: cargo build -p midn-proto

      - name: Build midn-core
        if: needs.parse-trigger.outputs.run_core == 'true'
        run: cargo build -p midn-core

      - name: Build midn-userplane
        if: needs.parse-trigger.outputs.run_userplane == 'true'
        run: cargo build -p midn-userplane

      # ── Build midn-userplane with eBPF feature ────────────────────────────────
      # Triggers aya-build → cargo +nightly build -p midn-userplane-ebpf
      #   --release --target bpfel-unknown-none -Z build-std=core
      # continue-on-error: verifier/linker issues don't block the main gate.
      - name: Build midn-userplane [--features ebpf]
        if: needs.parse-trigger.outputs.run_userplane == 'true'
        continue-on-error: true
        id: ebpf_build
        run: |
          cargo build -p midn-userplane --features ebpf \
            2>&1 | tee midn-userplane-ebpf-build.txt
          echo "UP_EBPF_BUILD_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV
          # Propagate pass/fail for the summary step
          exit ${PIPESTATUS[0]}

      # ── Test — debug (correctness) ────────────────────────────────────────────
      - name: Test midn-auth [DEBUG]
        if: needs.parse-trigger.outputs.run_auth == 'true'
        continue-on-error: true
        run: |
          cargo test -p midn-auth \
            --color=never --no-fail-fast -- --show-output \
            2>&1 | tee midn-auth-test-raw.txt
          echo "AUTH_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Test midn-proto [DEBUG]
        if: needs.parse-trigger.outputs.run_proto == 'true'
        continue-on-error: true
        run: |
          cargo test -p midn-proto \
            --color=never --no-fail-fast -- --show-output \
            2>&1 | tee midn-proto-test-raw.txt
          echo "PROTO_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Test midn-core [DEBUG]
        if: needs.parse-trigger.outputs.run_core == 'true'
        continue-on-error: true
        run: |
          cargo test -p midn-core \
            --color=never --no-fail-fast -- --show-output \
            2>&1 | tee midn-core-test-raw.txt
          echo "CORE_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Test midn-userplane [DEBUG]
        if: needs.parse-trigger.outputs.run_userplane == 'true'
        continue-on-error: true
        run: |
          cargo test -p midn-userplane \
            --color=never --no-fail-fast -- --show-output \
            2>&1 | tee midn-userplane-test-raw.txt
          echo "UP_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── Test midn-userplane with eBPF feature (DEBUG) ─────────────────────────
      # Same 34 unit tests but with BPF object embedded.
      # load_xdp() itself is not called by any test (needs CAP_NET_ADMIN).
      # continue-on-error: eBPF build failures don't fail the test gate.
      - name: Test midn-userplane [--features ebpf, DEBUG]
        if: |
          needs.parse-trigger.outputs.run_userplane == 'true' &&
          steps.ebpf_build.outcome == 'success'
        continue-on-error: true
        run: |
          cargo test -p midn-userplane --features ebpf \
            --color=never --no-fail-fast -- --show-output \
            2>&1 | tee midn-userplane-ebpf-test-raw.txt
          echo "UP_EBPF_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── Test — release (perf numbers) ─────────────────────────────────────────
      - name: Test midn-auth [RELEASE]
        if: needs.parse-trigger.outputs.run_auth == 'true'
        continue-on-error: true
        run: |
          cargo test -p midn-auth --release \
            --color=never --no-fail-fast -- --show-output \
            2>&1 | tee midn-auth-test-release-raw.txt

      - name: Test midn-proto [RELEASE]
        if: needs.parse-trigger.outputs.run_proto == 'true'
        continue-on-error: true
        run: |
          cargo test -p midn-proto --release \
            --color=never --no-fail-fast -- --show-output \
            2>&1 | tee midn-proto-test-release-raw.txt

      # ── Parse test results to JSON ────────────────────────────────────────────
      - name: Parse all results to JSON
        env:
          BUILD_NUM:    ${{ github.run_number }}
          BRANCH:       ${{ github.ref_name }}
          COMMIT:       ${{ github.sha }}
          BUILD_DATE:   ${{ github.event.head_commit.timestamp }}
          RUST_VERSION: ${{ steps.rustver.outputs.ver }}
          RUN_AUTH:     ${{ needs.parse-trigger.outputs.run_auth }}
          RUN_PROTO:    ${{ needs.parse-trigger.outputs.run_proto }}
          RUN_CORE:     ${{ needs.parse-trigger.outputs.run_core }}
          RUN_UP:       ${{ needs.parse-trigger.outputs.run_userplane }}
        run: |
          python3 - << 'PYEOF'
          import re, json, os

          RE_ANSI = re.compile(r'\x1B(?:[@-Z\\-_]|\[[0-?]*[ -/]*[@-~])')

          def parse_raw(filepath, crate_name):
              try:
                  raw = open(filepath, encoding='utf-8', errors='replace').read()
              except FileNotFoundError:
                  return None

              text = RE_ANSI.sub('', raw)

              test_output, fail_output = {}, {}
              for m in re.finditer(
                  r'---- ([\w:]+(?:::\w+)*) stdout ----\n(.*?)'
                  r'(?=\n---- |\n\n(?:successes|failures):\n|\ntest result:|\Z)',
                  text, re.DOTALL):
                  content = m.group(2).strip()
                  if content:
                      test_output[m.group(1)] = content

              fail_section = re.search(r'\nfailures:\n(.*?)(?:\ntest result:|\Z)', text, re.DOTALL)
              if fail_section:
                  for m in re.finditer(
                      r'---- ([\w:]+(?:::\w+)*) stdout ----\n(.*?)(?=\n---- |\Z)',
                      fail_section.group(1), re.DOTALL):
                      content = m.group(2).strip()
                      if content:
                          fail_output[m.group(1)] = content

              suites, cur_name, cur_tests, cur_dur = [], None, [], 0.0
              RE_RUN    = re.compile(r'Running\s+(?:unittests?\s+)?(\S+)\s+\(')
              RE_TEST   = re.compile(r'^test\s+([\w:]+(?:::\w+)*)\s+\.\.\.\s+(ok|FAILED|ignored)(?:\s+\(([\d.]+)s\))?')
              RE_RESULT = re.compile(r'test result:.*?finished in ([\d.]+)s')

              def flush(name, tests, dur):
                  if name and tests:
                      suites.append({
                          'name': name,
                          'passed':  sum(1 for t in tests if t['status'] == 'passed'),
                          'failed':  sum(1 for t in tests if t['status'] == 'failed'),
                          'ignored': sum(1 for t in tests if t['status'] == 'ignored'),
                          'duration_s': round(dur, 4),
                          'tests': tests,
                      })

              for line in text.splitlines():
                  m = RE_RUN.search(line)
                  if m:
                      flush(cur_name, cur_tests, cur_dur)
                      base = os.path.splitext(os.path.basename(m.group(1)))[0]
                      cur_name  = base + ' (unit tests)' if base in ('lib', 'main') else base
                      cur_tests, cur_dur = [], 0.0
                      continue
                  m = RE_TEST.match(line)
                  if m:
                      if cur_name is None:
                          cur_name, cur_tests, cur_dur = f'{crate_name} unit tests', [], 0.0
                      tname, status, dur = m.group(1), m.group(2), m.group(3)
                      out = fail_output.get(tname) or test_output.get(tname, '')
                      cur_tests.append({
                          'name':        tname,
                          'status':      {'ok':'passed','FAILED':'failed','ignored':'ignored'}.get(status,'unknown'),
                          'duration_ms': int(float(dur) * 1000) if dur else 0,
                          'output':      out,
                      })
                      continue
                  m = RE_RESULT.search(line)
                  if m:
                      cur_dur = float(m.group(1))
                      flush(cur_name, cur_tests, cur_dur)
                      cur_name, cur_tests, cur_dur = None, [], 0.0
              flush(cur_name, cur_tests, cur_dur)

              total   = sum(s['passed'] + s['failed'] + s['ignored'] for s in suites)
              passed  = sum(s['passed']  for s in suites)
              failed  = sum(s['failed']  for s in suites)
              ignored = sum(s['ignored'] for s in suites)
              dur     = sum(s['duration_s'] for s in suites)
              return {
                  'build':        os.environ['BUILD_NUM'],
                  'branch':       os.environ['BRANCH'],
                  'commit':       os.environ['COMMIT'][:8],
                  'date':         os.environ['BUILD_DATE'],
                  'rust_version': os.environ['RUST_VERSION'],
                  'crate':        crate_name,
                  'summary': { 'total': total, 'passed': passed,
                               'failed': failed, 'ignored': ignored,
                               'duration_s': round(dur, 3) },
                  'suites': suites,
              }

          crates_to_parse = [
              ('RUN_AUTH',  'midn-auth-test-raw.txt',       'midn-auth'),
              ('RUN_PROTO', 'midn-proto-test-raw.txt',      'midn-proto'),
              ('RUN_CORE',  'midn-core-test-raw.txt',       'midn-core'),
              ('RUN_UP',    'midn-userplane-test-raw.txt',  'midn-userplane'),
          ]

          for env_var, raw_file, crate_name in crates_to_parse:
              if os.environ.get(env_var) != 'true':
                  continue
              result = parse_raw(raw_file, crate_name)
              if result is None:
                  result = {
                      'build': os.environ['BUILD_NUM'], 'branch': os.environ['BRANCH'],
                      'commit': os.environ['COMMIT'][:8], 'crate': crate_name,
                      'summary': {'total':0,'passed':0,'failed':0,'ignored':0,'duration_s':0},
                      'suites': [],
                  }
              out_file = f'{crate_name}-test-results.json'
              with open(out_file, 'w') as f:
                  json.dump(result, f, indent=2)
              s = result['summary']
              print(f"{crate_name}: total={s['total']} passed={s['passed']} failed={s['failed']}")
          PYEOF

      # ── Build HTML reports ────────────────────────────────────────────────────
      - name: Build HTML reports
        env:
          RUST_VERSION: ${{ steps.rustver.outputs.ver }}
        run: |
          for CRATE in midn-auth midn-proto midn-core midn-userplane; do
            if [ -f "${CRATE}-test-results.json" ]; then
              cp .github/midn-test-template.html "${CRATE}-test-index.html"
              sed -i "s/CRATE_PLACEHOLDER/${CRATE}/g"                     "${CRATE}-test-index.html"
              sed -i "s/BUILD_NUM_PLACEHOLDER/${{ github.run_number }}/g"  "${CRATE}-test-index.html"
              sed -i "s/BRANCH_PLACEHOLDER/${{ github.ref_name }}/g"       "${CRATE}-test-index.html"
              sed -i "s/COMMIT_PLACEHOLDER/${GITHUB_SHA:0:8}/g"            "${CRATE}-test-index.html"
              sed -i "s|DATE_PLACEHOLDER|$(date -u)|g"                     "${CRATE}-test-index.html"
              sed -i "s|RUST_VERSION_PLACEHOLDER|${RUST_VERSION}|g"        "${CRATE}-test-index.html"
            fi
          done

      # ── Publish Step Summary ──────────────────────────────────────────────────
      - name: Publish test summary
        run: |
          {
            echo "## Midn Core — Test Results — Build #${{ github.run_number }}"
            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\` &nbsp; **Commit:** \`${GITHUB_SHA:0:8}\` &nbsp; **Rust:** \`$(rustc --version)\`"
            echo ""
            echo "| Crate | Total | Passed | Failed | Ignored | Duration |"
            echo "|---|---|---|---|---|---|"

            python3 - << 'PYEOF'
          import json, os, glob

          for json_file in sorted(glob.glob('*-test-results.json')):
              try:
                  d = json.load(open(json_file))
                  s = d['summary']
                  icon = '✅' if s['failed'] == 0 and s['total'] > 0 else ('❌' if s['failed'] > 0 else '⏭')
                  print(f"| {icon} `{d['crate']}` | {s['total']} | {s['passed']} | {s['failed']} | {s['ignored']} | {s['duration_s']:.2f}s |")
              except Exception:
                  pass
          PYEOF

            echo ""
            echo "> Debug build (correctness). Release build numbers are in the artifact \`*-test-release-raw.txt\`."
            echo ""

            # eBPF feature build status
            echo "### eBPF Feature Build"
            echo ""
            if [ -f "midn-userplane-ebpf-build.txt" ]; then
              LAST=$(tail -3 midn-userplane-ebpf-build.txt)
              if echo "$LAST" | grep -q "^error"; then
                echo "❌ \`--features ebpf\` build failed (continue-on-error — does not block gate)"
              else
                echo "✅ \`--features ebpf\` build succeeded — BPF object embedded"
              fi
              echo ""
              echo "<details><summary>Build tail</summary>"
              echo ""
              echo '```'
              tail -10 midn-userplane-ebpf-build.txt
              echo '```'
              echo ""
              echo "</details>"
            else
              echo "⏭ eBPF feature build not triggered this run"
            fi

            # eBPF feature test counts.
            #
            # FIX (was producing "0 0 passed, 0 0 failed"):
            #   1. The old regex '^\.\.\. ok$' required the line to literally
            #      START with "... ok" — actual cargo output is
            #      "test foo::bar ... ok", so it NEVER matched, even on success.
            #   2. `grep -c PATTERN file || echo 0` double-prints zero: grep -c
            #      already prints "0" to stdout when there's no match (it just
            #      also exits 1), so the `|| echo 0` fallback ALSO fires and
            #      prints a second "0" into the same $(...) capture — the
            #      newline between them collapses to a space, giving "0 0".
            #
            # Fixed: drop the anchors (match "... ok" / "... FAILED" anywhere
            # on the line, which tolerates the optional trailing "(N.NNs)"
            # timing suffix cargo appends to slow tests), and drop the
            # `|| echo 0` double-print in favor of a plain `${VAR:-0}` default.
            if [ -f "midn-userplane-ebpf-test-raw.txt" ]; then
              echo ""
              PASSED=$(grep -c '\.\.\. ok' midn-userplane-ebpf-test-raw.txt 2>/dev/null || true)
              PASSED=${PASSED:-0}
              FAILED=$(grep -c '\.\.\. FAILED' midn-userplane-ebpf-test-raw.txt 2>/dev/null || true)
              FAILED=${FAILED:-0}
              echo "eBPF feature tests: **${PASSED} passed**, **${FAILED} failed**"
            fi

            echo ""
            echo "### Release Performance Highlights"
            echo ""

            python3 - << 'PYEOF'
          import re, os

          RE_ANSI = re.compile(r'\x1B(?:[@-Z\\-_]|\[[0-?]*[ -/]*[@-~])')

          found_any = False
          for fname in ['midn-auth-test-release-raw.txt', 'midn-proto-test-release-raw.txt']:
              try:
                  raw  = open(fname, encoding='utf-8', errors='replace').read()
              except FileNotFoundError:
                  continue
              text = RE_ANSI.sub('', raw)
              lines = [l.strip() for l in text.splitlines()
                       if '[RELEASE]' in l and re.search(r'ns/op|ns/entity|µs', l)]
              if lines:
                  crate = fname.split('-test')[0]
                  print(f"**{crate}**")
                  print("```")
                  for line in lines[:10]:
                      print(line)
                  print("```")
                  print()
                  found_any = True

          if not found_any:
              print("*(No release performance lines found — run benchmarks via Actions → midn-core: Benchmarks)*")
          PYEOF

          } >> $GITHUB_STEP_SUMMARY

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midn-test-results-${{ github.run_number }}
          path: |
            *-test-results.json
            *-test-index.html
            *-test-release-raw.txt
            midn-userplane-ebpf-build.txt
            midn-userplane-ebpf-test-raw.txt
          retention-days: 14

  # ── Deploy to gh-pages ────────────────────────────────────────────────────────
  deploy-results:
    runs-on: ubuntu-latest
    needs: [parse-trigger, run-tests]
    if: always() && needs.run-tests.result != 'skipped'

    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: midn-test-results-${{ github.run_number }}
          path: deploy/

      - name: Deploy to gh-pages
        run: |
          git config --global user.name  "Midn Core CI"
          git config --global user.email "ci@midn-core.dev"

          BUILD_NUM=${{ github.run_number }}
          WORK=$(mktemp -d)

          if git fetch origin gh-pages:gh-pages 2>/dev/null; then
            git worktree add "$WORK" gh-pages
          else
            git worktree add --orphan -b gh-pages "$WORK"
          fi

          for CRATE in midn-auth midn-proto midn-core midn-userplane; do
            JSON="deploy/${CRATE}-test-results.json"
            HTML="deploy/${CRATE}-test-index.html"

            if [ -f "$JSON" ]; then
              mkdir -p "$WORK/${CRATE}" "$WORK/${CRATE}/builds/build_${BUILD_NUM}"
              cp "$JSON" "$WORK/${CRATE}/${CRATE}-test-results.json"
              cp "$JSON" "$WORK/${CRATE}/builds/build_${BUILD_NUM}/${CRATE}-test-results.json"
            fi
            if [ -f "$HTML" ]; then
              cp "$HTML" "$WORK/${CRATE}/index.html"
              cp "$HTML" "$WORK/${CRATE}/builds/build_${BUILD_NUM}/index.html"
            fi

            PERF="deploy/${CRATE}-test-release-raw.txt"
            [ -f "$PERF" ] && cp "$PERF" "$WORK/${CRATE}/builds/build_${BUILD_NUM}/release-perf.txt" || true
          done

          # eBPF build log
          EBPF_LOG="deploy/midn-userplane-ebpf-build.txt"
          [ -f "$EBPF_LOG" ] && \
            cp "$EBPF_LOG" "$WORK/midn-userplane/builds/build_${BUILD_NUM}/ebpf-build.txt" || true

          cp .github/midn-ci-dashboard.html "$WORK/index.html"

          cd "$WORK"
          git add .
          if git diff --staged --quiet; then
            echo "Nothing new to deploy."
            exit 0
          fi
          git commit -m "midn-core tests — Build #${BUILD_NUM} [skip ci]"
          git push \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages

  # ── Summary ───────────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [parse-trigger, run-tests, deploy-results]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "============================================="
          echo "  Midn Core — Test Summary"
          echo "============================================="
          echo "Build:      #${{ github.run_number }}"
          echo "Branch:     ${{ github.ref_name }}"
          echo "Tests:      ${{ needs.run-tests.result    || 'skipped' }}"
          echo "Deploy:     ${{ needs.deploy-results.result || 'skipped' }}"
          echo ""
          echo "Crates triggered:"
          echo "  midn-auth:      ${{ needs.parse-trigger.outputs.run_auth }}"
          echo "  midn-proto:     ${{ needs.parse-trigger.outputs.run_proto }}"
          echo "  midn-core:      ${{ needs.parse-trigger.outputs.run_core }}"
          echo "  midn-userplane: ${{ needs.parse-trigger.outputs.run_userplane }}"
          echo ""
          if [ "${{ needs.parse-trigger.outputs.run_any }}" != "true" ]; then
            echo "Not triggered. Either use a commit token:"
            echo "  --midn-auth  --midn-proto  --midn-core  --midn-userplane  --midn-all"
            echo "Or touch any source file under crates/midn-*/ (auto-detected)."
          fi
