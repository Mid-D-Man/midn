# .github/workflows/midn-bench.yml
# Criterion benchmarks for Midn Core.
#
# Run manually: Actions → "midn-core: Benchmarks" → Run workflow
# DO NOT add push/pull_request triggers — benches take 5-10 minutes.
#
# Phase gates:
#   midn-auth   — Milenage verify_res, RAND generation (generate_vector stubs until Phase 1)
#   midn-proto  — GTP-U header parse, full parser, bulk throughput
#
# Performance gates (per docs/platform-optimization.md):
#   midn-auth  : Milenage generate_vector < 10 µs [RELEASE]
#   midn-proto : GTP-U parse              < 500 ns [RELEASE]

name: midn-core — Benchmarks

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Context for this run (e.g. "post GTP-U parser rewrite")'
        required: false
        default: 'manual benchmark run'
      crate:
        description: 'Crate to bench (auth / proto / all)'
        required: false
        default: 'all'

permissions:
  contents: read
  actions:  read

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get Rust version
        id: rustver
        run: echo "ver=$(rustc --version)" >> $GITHUB_OUTPUT

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-midn-bench-${{ hashFiles('Cargo.toml') }}
          restore-keys: cargo-registry-

      # ── midn-auth benchmarks ──────────────────────────────────────────────────
      - name: Bench midn-auth
        if: inputs.crate == 'all' || inputs.crate == 'auth'
        run: |
          echo "=== midn-auth Criterion benchmarks ==="
          echo "Note: ${{ inputs.note }}"
          echo ""
          echo "Phase 1 gate: Milenage generate_vector < 10 µs [RELEASE]"
          echo "Current: generate_vector is stubbed (todo!) — only verify_res and rand_gen are live."
          echo ""
          cargo bench --bench auth_bench -p midn-auth 2>&1 | tee bench-auth-raw.txt
          echo "BENCH_AUTH_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── midn-proto benchmarks ─────────────────────────────────────────────────
      - name: Bench midn-proto
        if: inputs.crate == 'all' || inputs.crate == 'proto'
        run: |
          echo "=== midn-proto Criterion benchmarks ==="
          echo "Note: ${{ inputs.note }}"
          echo ""
          echo "Phase 2 gate: GTP-U header parse < 500 ns [RELEASE]"
          echo ""
          cargo bench --bench proto_bench -p midn-proto 2>&1 | tee bench-proto-raw.txt
          echo "BENCH_PROTO_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── Publish Step Summary ──────────────────────────────────────────────────
      - name: Publish benchmark summary
        if: always()
        run: |
          {
            echo "## Midn Core — Benchmark Results — Build #${{ github.run_number }}"
            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\` &nbsp; **Commit:** \`${GITHUB_SHA:0:8}\` &nbsp; **Rust:** \`${{ steps.rustver.outputs.ver }}\`"
            echo ""
            echo "**Note:** ${{ inputs.note }}"
            echo ""
            echo "> All numbers from Criterion at **[RELEASE]** opt-level 3, LTO=true."
            echo "> Lower is better. Gate values from \`docs/platform-optimization.md\`."
            echo ""

            python3 - << 'PYEOF'
          import re, sys, os

          RE_ANSI   = re.compile(r'\x1B(?:[@-Z\\-_]|\[[0-?]*[ -/]*[@-~])')
          RE_RESULT = re.compile(
              r'^(\S[^\n]+?)\s+time:\s+\[\s*([\d.]+\s+\S+)\s+([\d.]+\s+\S+)\s+([\d.]+\s+\S+)\s*\]',
              re.MULTILINE,
          )

          # Gate definitions: {bench_name_fragment: (gate_value, gate_unit, gate_ns)}
          GATES = {
              'gtpu_parser_gpdu_minimal': (500, 'ns', 500),
              'gtpu_header_parse':        (500, 'ns', 500),
              'milenage_generate_vector': (10_000, 'ns', 10_000),
              'verify_res_constant_time': (10, 'ns', 10),
          }

          def parse_time_to_ns(time_str):
              """Convert Criterion time string like '1.23 µs' to nanoseconds."""
              parts = time_str.strip().split()
              if len(parts) != 2:
                  return None
              val, unit = float(parts[0]), parts[1]
              multipliers = {'ns': 1, 'µs': 1000, 'us': 1000, 'ms': 1_000_000, 's': 1_000_000_000}
              return val * multipliers.get(unit, 1)

          def gate_status(bench_name, mean_ns):
              for fragment, (gate_val, gate_unit, gate_ns) in GATES.items():
                  if fragment in bench_name:
                      if mean_ns <= gate_ns:
                          return f'✅ < {gate_val} {gate_unit}'
                      else:
                          return f'❌ > {gate_val} {gate_unit} (gate miss)'
              return '—'

          raw_files = [
              ('bench-auth-raw.txt',  'midn-auth'),
              ('bench-proto-raw.txt', 'midn-proto'),
          ]

          for raw_file, crate_name in raw_files:
              try:
                  raw  = open(raw_file, encoding='utf-8', errors='replace').read()
              except FileNotFoundError:
                  continue

              text    = RE_ANSI.sub('', raw)
              matches = list(RE_RESULT.finditer(text))
              if not matches:
                  print(f"### {crate_name}\n\n*(No Criterion results found — build may have failed)*\n")
                  continue

              print(f"### {crate_name}\n")
              print("| Benchmark | Mean | Gate |")
              print("|---|---|---|")

              current_group = None
              for m in matches:
                  name = m.group(1).strip()
                  mean = m.group(3).strip()

                  parts  = name.split('/')
                  group  = '/'.join(parts[:-1]) if len(parts) >= 2 else ''
                  bench  = parts[-1] if len(parts) >= 2 else name

                  if group and group != current_group:
                      print(f"| **{group}** | | |")
                      current_group = group

                  mean_ns    = parse_time_to_ns(mean)
                  gate_label = gate_status(name.lower().replace(' ', '_'), mean_ns) if mean_ns else '—'

                  display = f"&nbsp;&nbsp;{bench}" if group else bench
                  print(f"| {display} | **{mean}** | {gate_label} |")

              print()

          PYEOF

            echo ""
            echo "---"
            echo "### Phase Status"
            echo ""
            echo "| Crate | Phase | Gate | Notes |"
            echo "|---|---|---|---|"
            echo "| \`midn-auth\` | 1 — active | Milenage < 10 µs | \`generate_vector\` stubbed until f1-f5 impl |"
            echo "| \`midn-proto\` | 2 | GTP-U < 500 ns | Parser complete — gate should be ✅ |"

          } >> $GITHUB_STEP_SUMMARY

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload bench artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midn-bench-${{ github.run_number }}
          path: |
            bench-auth-raw.txt
            bench-proto-raw.txt
            target/criterion/
          retention-days: 30
