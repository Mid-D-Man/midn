# .github/workflows/midn-bench.yml
# Criterion benchmarks for Midn Core.
#
# Run manually: Actions → "midn-core: Benchmarks" → Run workflow
# DO NOT add push/pull_request triggers — benches take 5-10 minutes.
#
# Gates (per docs/platform-optimization.md):
#   midn-auth  : verify_res_constant_time  < 25 ns   (constant-time; ~12-15 ns expected)
#   midn-auth  : generate_rand_os_csprng   < 100 ns  (getrandom syscall; ~40-80 ns expected)
#   midn-auth  : milenage_generate_vector  < 10 µs   (stub until Phase 1)
#   midn-proto : GTP-U parse               < 500 ns  (Build #11: 1.88 ns — gate is conservative)

name: midn-core — Benchmarks

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Context for this run (e.g. "post Milenage f1 impl")'
        required: false
        default: 'manual benchmark run'
      crate:
        description: 'Crate to bench (auth / proto / all)'
        required: false
        default: 'all'

permissions:
  contents: read
  actions:  read

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get Rust version
        id: rustver
        run: echo "ver=$(rustc --version)" >> $GITHUB_OUTPUT

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-midn-bench-${{ hashFiles('Cargo.toml') }}
          restore-keys: cargo-registry-

      # ── midn-auth benchmarks ──────────────────────────────────────────────────
      - name: Bench midn-auth
        if: inputs.crate == 'all' || inputs.crate == 'auth'
        run: |
          echo "=== midn-auth Criterion benchmarks ==="
          echo "Note: ${{ inputs.note }}"
          echo ""
          echo "Gates:"
          echo "  verify_res_constant_time  < 25 ns  (constant-time; tightening below 15 ns is wrong)"
          echo "  generate_rand_os_csprng   < 100 ns (getrandom syscall)"
          echo "  milenage_generate_vector  < 10 µs  (stub until Phase 1 — number is not real)"
          echo ""
          cargo bench --bench auth_bench -p midn-auth 2>&1 | tee bench-auth-raw.txt

      # ── midn-proto benchmarks ─────────────────────────────────────────────────
      - name: Bench midn-proto
        if: inputs.crate == 'all' || inputs.crate == 'proto'
        run: |
          echo "=== midn-proto Criterion benchmarks ==="
          echo "Note: ${{ inputs.note }}"
          echo ""
          echo "Gates:"
          echo "  GTP-U parse < 500 ns  (Build #11 baseline: 1.88 ns — gate is intentionally conservative)"
          echo ""
          cargo bench --bench proto_bench -p midn-proto 2>&1 | tee bench-proto-raw.txt

      # ── Publish Step Summary ──────────────────────────────────────────────────
      - name: Publish benchmark summary
        if: always()
        run: |
          {
            echo "## Midn Core — Benchmark Results — Build #${{ github.run_number }}"
            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\` &nbsp; **Commit:** \`${GITHUB_SHA:0:8}\` &nbsp; **Rust:** \`${{ steps.rustver.outputs.ver }}\`"
            echo ""
            echo "**Note:** ${{ inputs.note }}"
            echo ""
            echo "> All numbers from Criterion at **[RELEASE]** opt-level 3, LTO=true."
            echo "> Lower is better. Gate values from \`docs/platform-optimization.md\`."
            echo ""

            python3 - << 'PYEOF'
          import re, sys, os

          RE_ANSI   = re.compile(r'\x1B(?:[@-Z\\-_]|\[[0-?]*[ -/]*[@-~])')
          RE_RESULT = re.compile(
              r'^(\S[^\n]+?)\s+time:\s+\[\s*([\d.]+\s+\S+)\s+([\d.]+\s+\S+)\s+([\d.]+\s+\S+)\s*\]',
              re.MULTILINE,
          )

          # Gates: bench_name_fragment → (display_threshold, display_unit, threshold_ns)
          # verify_res: 25 ns (constant-time comparison — intentionally ~12-15 ns)
          # gtpu:       500 ns (conservative; Build #11 actual: ~1.9 ns)
          # milenage:   10000 ns (stub gate; real gate applies post Phase 1 impl)
          # rand:       100 ns (getrandom syscall; ~40-80 ns expected)
          GATES = {
              'milenage_generate_vector':          (10_000, 'ns',  10_000),
              'verify_res_constant_time':          (25,     'ns',  25),
              'generate_rand_os_csprng':           (100,    'ns',  100),
              'gtpu_parser_gpdu_minimal':          (500,    'ns',  500),
              'gtpu_header_parse':                 (500,    'ns',  500),
              'gtpu_parser_gpdu_with_seq':         (500,    'ns',  500),
              'gtpu_header_serialize_round_trip':  (500,    'ns',  500),
          }

          def parse_time_to_ns(time_str):
              parts = time_str.strip().split()
              if len(parts) != 2:
                  return None
              val, unit = float(parts[0]), parts[1].lower()
              mul = {'ps': 0.001, 'ns': 1, 'µs': 1000, 'us': 1000, 'ms': 1_000_000, 's': 1_000_000_000}
              return val * mul.get(unit, 1)

          def gate_label(bench_name, mean_ns):
              key = bench_name.lower().replace(' ', '_').replace('/', '_')
              for fragment, (threshold, unit, threshold_ns) in GATES.items():
                  if fragment in key:
                      if mean_ns is None:
                          return '—'
                      if mean_ns <= threshold_ns:
                          return f'✅ < {threshold} {unit}'
                      else:
                          return f'❌ > {threshold} {unit} — gate miss'
              return '—'

          # Stub note: generate_vector is not implemented yet; the bench result
          # measures black_box overhead only and should not be used for decisions.
          STUB_NOTE = {
              'milenage_generate_vector': ' *(stub — not a real measurement)*',
          }

          raw_files = [
              ('bench-auth-raw.txt',  'midn-auth'),
              ('bench-proto-raw.txt', 'midn-proto'),
          ]

          for raw_file, crate_name in raw_files:
              try:
                  raw = open(raw_file, encoding='utf-8', errors='replace').read()
              except FileNotFoundError:
                  continue

              text    = RE_ANSI.sub('', raw)
              matches = list(RE_RESULT.finditer(text))
              if not matches:
                  print(f"### {crate_name}\n\n*(No Criterion results — build may have failed)*\n")
                  continue

              print(f"### {crate_name}\n")
              print("| Benchmark | Mean | Gate |")
              print("|---|---|---|")

              current_group = None
              for m in matches:
                  name = m.group(1).strip()
                  mean = m.group(3).strip()

                  parts = name.split('/')
                  group = '/'.join(parts[:-1]) if len(parts) >= 2 else ''
                  bench = parts[-1]           if len(parts) >= 2 else name

                  if group and group != current_group:
                      print(f"| **{group}** | | |")
                      current_group = group

                  mean_ns    = parse_time_to_ns(mean)
                  gate       = gate_label(name, mean_ns)
                  stub_note  = STUB_NOTE.get(bench.lower().replace(' ', '_'), '')
                  display    = f"&nbsp;&nbsp;{bench}" if group else bench

                  print(f"| {display} | **{mean}**{stub_note} | {gate} |")

              print()

          PYEOF

            echo ""
            echo "---"
            echo "### Gate Reference"
            echo ""
            echo "| Benchmark | Gate | Rationale |"
            echo "|---|---|---|"
            echo "| \`verify_res_constant_time\` | < 25 ns | \`subtle::ConstantTimeEq\` is intentionally ~12-15 ns; tightening is wrong |"
            echo "| \`generate_rand_os_csprng\` | < 100 ns | getrandom(2) syscall; 40-80 ns expected |"
            echo "| \`milenage_generate_vector\` | < 10 µs | stub gate — real measurement begins at Phase 1 |"
            echo "| \`gtpu_parser_gpdu_minimal\` | < 500 ns | conservative; Build #11 actual: ~1.9 ns |"
            echo "| \`gtpu_header_parse\` | < 500 ns | conservative; Build #11 actual: ~6.5 ns |"

          } >> $GITHUB_STEP_SUMMARY

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload bench artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midn-bench-${{ github.run_number }}
          path: |
            bench-auth-raw.txt
            bench-proto-raw.txt
            target/criterion/
          retention-days: 30
